<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Conference</title>
    <link rel="stylesheet" href="./style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <!-- Navbar start -->
        <nav class="container">
            <div id="nav">
                <!-- Left side -->
                <div>
                    <img src="./assets/logo.png" alt="logo of devconf 2026">
                </div>

                <!-- Middle -->
                <div id="nav-list">
                    <ul>
                        <li><a href="">Speakers</a></li>
                        <li><a href="">Schedule</a></li>
                        <li><a href="">Tracks</a></li>
                        <li><a href="">Venue</a></li>
                        <li><a href="">BLog</a></li>
                    </ul>
                </div>

                <!-- Right side -->
                <div>
                    <button type="button" class="common-btn">Register Now</button>
                </div>
            </div>
        </nav>
        <!-- Navbar end -->
    </header>

    <!-- Hero section start -->
    <section class="hero-container">
        <img src="./assets/banner.jpg" alt="banner of hero container">
        <div class="hero-root">
            <h2>Code. <em>C</em>onnect. Create</h2>
            <p>Join 4,000+ engineers, founders, and builders at the premier developer conference of 2026. Three days of cutting-edge talks, hands-on workshops, and meaningful connections.</p>
            <button type="button" class="common-btn">Register Now</button>
        </div>
    </section>
    <!-- Hero section end -->
</body>

</html>
